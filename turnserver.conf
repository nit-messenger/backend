# Listening port
listening-port=3478

# TLS listening port (optional)
tls-listening-port=5349

# Listening IP
listening-ip=0.0.0.0

# External IP (Should be configured to the server's public IP in production)
# external-ip=1.2.3.4

# User database configuration
user=nituser:nitcredential

# Realm
realm=nit.home

# Fingerprint
fingerprint

# Disable local host/loopback interfaces for relaying
no-multicast-peers
no-loopback-peers
no-cli

# Secure logging
verbose
